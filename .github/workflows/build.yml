name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-33 build-tools;33.0.2'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Download Gradle Wrapper JAR
      run: |
        curl -sL "https://github.com/gradle/gradle/raw/v7.5.1/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
        if [ ! -s gradle/wrapper/gradle-wrapper.jar ]; then
          curl -sL "https://services.gradle.org/distributions/gradle-7.5.1-bin.zip" -o /tmp/gradle.zip
          unzip -j /tmp/gradle.zip "gradle-7.5.1/lib/gradle-wrapper-*.jar" -d /tmp/
          find /tmp -name "*.jar" -path "*wrapper*" -exec cp {} gradle/wrapper/gradle-wrapper.jar \;
        fi
        chmod +x gradlew
        ls -la gradle/wrapper/

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: InstallGuard-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
