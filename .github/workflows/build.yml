name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-33 build-tools;33.0.2'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Generate Keystore
      run: |
        keytool -genkeypair -v \
          -keystore app/installguard.keystore \
          -alias installguard \
          -keyalg RSA -keysize 2048 \
          -validity 10000 \
          -storepass installguard2026 \
          -keypass installguard2026 \
          -dname "CN=InstallGuard, OU=App, O=OpenSource, L=Shenzhen, ST=Guangdong, C=CN"

    - name: Download Gradle Wrapper JAR and create gradlew
      run: |
        curl -sL "https://github.com/gradle/gradle/raw/v7.5.1/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
        cat > gradlew << 'EOF'
        #!/bin/sh
        exec java -classpath gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain "$@"
        EOF
        chmod +x gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: InstallGuard-v2.1-apk
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 90
