name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-33 build-tools;33.0.2'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Download Gradle Wrapper JAR and create gradlew
      run: |
        curl -sL "https://github.com/gradle/gradle/raw/v7.5.1/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
        cat > gradlew << 'GRADLEW_EOF'
        #!/bin/sh
        exec java -classpath gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain "$@"
        GRADLEW_EOF
        chmod +x gradlew
        ls -la gradlew gradle/wrapper/gradle-wrapper.jar

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: InstallGuard-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
